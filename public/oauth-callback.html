<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reclaim — Signing in</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0b1014;
        color: #f8f7f3;
        font-family: Inter, system-ui, sans-serif;
        text-align: center;
      }
      p { margin: 0; opacity: 0.85; }
      a {
        margin-top: 16px;
        color: #ffcc80;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <p>Signing you in…</p>
    <a id="return-link" href="#">Return to the Reclaim app</a>
    <script>
      (function () {
        // Google redirects here with #access_token=... in the URL fragment.
        var payload = window.location.hash || '';
        if (!payload && window.location.search) {
          payload = '#' + window.location.search.slice(1);
        }

        // Hand the tokens back to the native app via its custom scheme.
        var appTarget = 'com.reclaim.app://oauth' + payload;
        document.getElementById('return-link').setAttribute('href', appTarget);

        // If this page is rendered inside the app WebView, post the result up.
        if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: 'GOOGLE_OAUTH_RESULT', hash: payload })
          );
        }

        // Bounce to the app. The OS intercepts the custom scheme and closes the browser.
        window.location.replace(appTarget);
      })();
    </script>
  </body>
</html>
